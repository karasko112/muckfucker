<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .name {
            font-size: 8.5rem;
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
            position: relative;
            display: inline-block;
            opacity: 0;
            transform: translateY(-120px);
        }

        .hello {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 30px;
            opacity: 0;
        }

        .bracket-left,
        .bracket-right {
            font-size: 8.5rem;
            font-weight: 900;
            position: absolute;
            top: 50%;
            transform: translateY(-52%);
            opacity: 0;
            line-height: 1;
        }

        .bracket-left  { left: -95px; }
        .bracket-right { right: -95px; }

        /* Анимации */
        @keyframes slideDown {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .animate-name {
            animation: slideDown 1.1s forwards ease-out;
        }

        .animate-brackets {
            animation: fadeIn 0.8s forwards 1.1s;
        }

        .animate-hello {
            animation: fadeIn 1s forwards 2s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name" id="name">karasko</div>
        
        <span class="bracket-left" id="left">[</span>
        <span class="bracket-right" id="right">]</span>

        <div class="hello" id="hello">hello guys</div>
    </div>

    <script>
        const name = document.getElementById('name');
        const hello = document.getElementById('hello');
        const left = document.getElementById('left');
        const right = document.getElementById('right');

        window.onload = () => {
            // 1. Ник выезжает сверху вниз
            setTimeout(() => {
                name.classList.add('animate-name');
            }, 200);

            // 2. Появляются скобки
            setTimeout(() => {
                left.classList.add('animate-brackets');
                right.classList.add('animate-brackets');
            }, 1300);

            // 3. Появляется "hello guys" снизу
            setTimeout(() => {
                hello.classList.add('animate-hello');
            }, 2200);
        };
    </script>

</body>
</html>
